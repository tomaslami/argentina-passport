# Codex CLI — configuración para el proyecto Argentina Passport
# Ver: https://github.com/openai/codex/blob/main/docs/config.md

# ─────────────────────────── Modelo y razonamiento ───────────────────────────

model = "gpt-5-codex"
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"

# ─────────────────────────── Aprobaciones y sandbox ──────────────────────────

# on-failure: Codex ejecuta autónomamente y solo pide permiso cuando algo falla
# o cuando intenta una acción que escapa del sandbox.
approval_policy = "on-failure"

# workspace-write: puede leer todo, escribir solo dentro del repo, sin red por defecto.
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true               # necesario para pnpm install, vercel, etc.
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

# ─────────────────────────── Comportamiento del agente ───────────────────────

# Mostrar a Codex el contexto del proyecto al inicio de cada sesión.
project_doc_max_bytes = 65536

# Permitir ejecución de comandos useful sin pedir permiso explícito.
[shell_environment_policy]
inherit = "all"

# ─────────────────────────── Notificaciones ──────────────────────────────────

# Notificar al desarrollador cuando una tarea termina o falla.
notify = ["terminal-notifier", "-title", "Codex"]

# ─────────────────────────── MCPs (opcional) ─────────────────────────────────
# Si tenés Figma MCP configurado, descomentá y configurá:
# [mcp_servers.figma]
# command = "npx"
# args = ["-y", "@figma/mcp-server"]
# env = { FIGMA_TOKEN = "${FIGMA_TOKEN}" }

# ─────────────────────────── Profiles por agente ─────────────────────────────
# Los agentes en .codex/agents/*.toml extienden esta config con overrides
# específicos (effort, instrucciones, herramientas permitidas).
